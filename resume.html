<style>
  :root {
    --sand-50: #faf8f5; --sand-200: #e8e1d6; --sand-400: #b8a890; --sand-500: #9a8870;
    --ink-900: #1c1814; --ink-500: #6b6257;
    --accent: #2d5a4e; --accent-mid: #4a7c6f;
    --white: #ffffff;
    --font-display: 'DM Serif Display', Georgia, serif;
    --font-body: 'DM Sans', sans-serif;
    --nav-h: 68px;
    --bar-h: 53px;
    --footer-h: 53px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--font-body); background: var(--sand-50); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--nav-h); background: rgba(250,248,245,0.92);
    backdrop-filter: blur(12px); border-bottom: 1px solid var(--sand-200);
    display: flex; align-items: center; justify-content: space-between; padding: 0 5vw;
  }
  .nav-logo { font-family: var(--font-display); font-size: 1.15rem; color: var(--ink-900); text-decoration: none; }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a { font-size: 0.82rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-500); text-decoration: none; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--accent); }

  .page-bar {
    position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 99;
    height: var(--bar-h); padding: 0 5vw;
    display: flex; align-items: center; justify-content: space-between;
    background: var(--white); border-bottom: 1px solid var(--sand-200);
  }
  .page-bar-title { font-family: var(--font-display); font-size: 0.95rem; color: var(--ink-900); }
  .btn-download {
    display: inline-flex; align-items: center; gap: 7px;
    background: var(--accent); color: var(--white);
    padding: 0.5rem 1.1rem; border-radius: 4px;
    font-size: 0.8rem; font-weight: 500; letter-spacing: 0.04em;
    text-decoration: none; transition: background 0.2s;
  }
  .btn-download:hover { background: var(--accent-mid); }

  .pdf-wrapper {
    position: fixed;
    top: calc(var(--nav-h) + var(--bar-h));
    left: 0; right: 0;
    bottom: var(--footer-h);
    background: #525659;
  }
  .pdf-wrapper iframe { width: 100%; height: 100%; border: none; display: block; }

  footer {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 99;
    height: var(--footer-h);
    background: var(--ink-900); border-top: 1px solid rgba(255,255,255,0.06);
    padding: 0 5vw; display: flex; justify-content: space-between; align-items: center;
  }
  footer a { color: var(--sand-400); text-decoration: none; font-size: 0.78rem; transition: color 0.2s; }
  footer a:hover { color: var(--white); }
  footer p { font-size: 0.78rem; color: var(--sand-500); }

  @media (max-width: 900px) { .nav-links { display: none; } }
</style>
</head>
<body>

</div>

<div class="pdf-wrapper">

</div>

<footer>
  <p>© 2026 Maria Fernanda Flores · New York, NY</p>
  <div style="display:flex;gap:1.5rem">

    <a href="work.html">Work</a>
    <a href="resume.html">Resume</a>
  </div>
</footer>

</body>
</html>
